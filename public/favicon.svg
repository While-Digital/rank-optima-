<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8eff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Magnifier lens -->
  <circle cx="28" cy="27" r="12" fill="rgba(79,142,255,0.12)" stroke="url(#grad)" stroke-width="3"/>

  <!-- Bar chart inside lens (solid bars) -->
  <rect x="22" y="29" width="3.5" height="5.5" rx="1" fill="url(#grad)"/>
  <rect x="27" y="25.5" width="3.5" height="9" rx="1" fill="url(#grad)"/>
  <rect x="32" y="22.5" width="3.5" height="12" rx="1" fill="url(#grad)"/>

  <!-- Handle -->
  <line x1="37.5" y1="36.5" x2="46" y2="45" stroke="url(#grad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Tip glow dot -->
  <circle cx="46" cy="45" r="2.5" fill="#22d3ee" opacity="0.9"/>
</svg>
